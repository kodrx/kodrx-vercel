<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>KodRx · Verificar receta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="/componentes/header.js" defer></script>

<link rel="stylesheet" href="/estilos/global.css" />

</head>
<body>
  <kodrx-verify-card style="display:block; max-width:920px; margin:16px auto; padding:0 12px;"></kodrx-verify-card>
<script>
customElements.define('kodrx-verify-card', class extends HTMLElement {
  constructor() {
    super();
    this.$ = this.attachShadow({ mode: 'open' });
  }

  connectedCallback() {
    this.init();
  }

  async init() {
    this.renderSkeleton();

    try {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) return this.renderError('Falta id de receta en la URL.');

      const core = await import('/firebase-init.js');
      const fs = await import('https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js');

      const snap = await fs.getDoc(fs.doc(core.db, 'recetas_publicas', id));
      if (!snap.exists()) return this.renderError('Receta no encontrada o no disponible.');

      const raw = { id: snap.id, ...(snap.data() || {}) };
      const r = this.normalize(raw);
      this.render(r);
    } catch (e) {
      console.error('[verify]', e);
      const msg = (e && (e.message || e.toString()))
        ? (e.message || e.toString())
        : 'Error desconocido';
      this.renderError('No se pudo cargar la receta. ' + msg);
    }
  }

  normalize(raw0) {
    const raw = raw0 || {};
    const bc = raw.blockchain || {};

    const bloque = Number.isFinite(raw.bloque)
      ? raw.bloque
      : (bc.block ?? null);

    const hash = bc.hash ?? raw.hash ?? null;

    const status = bc.status || (bloque ? 'ok' : (hash ? 'simulado' : 'pendiente'));

    const medico = {
      nombre: raw.medico?.nombre ?? raw.medicoNombre ?? '—',
      genero: raw.medico?.genero ?? raw.medicoGenero ?? '',
      cedula: raw.medico?.cedula ?? raw.medicoCedula ?? '—',
      especialidad: raw.medico?.especialidad ?? raw.medicoEspecialidad ?? '—'
    };

    return {
      ...raw,
      medico,
      indicaciones: raw.indicaciones ?? '—',
      bloque,
      hash,
      blockchain: {
        ...bc,
        status,
        block: (bc.block ?? bloque) ?? null,
        hash
      }
    };
  }

  pillInfo(r) {
    const bc = r.blockchain || {};
    const hasBlock = r.bloque != null || bc.block != null;

    if (bc.status === 'ok' || hasBlock) {
      return { cls: 'pill ok', txt: 'SELLADO EN BLOCKCHAIN' };
    }

    if (bc.status === 'simulado' || r.hash) {
      return { cls: 'pill warn', txt: 'SELLADO SIMULADO' };
    }

    return { cls: 'pill warn', txt: 'PENDIENTE' };
  }

  fecha(ts) {
    try {
      if (ts && typeof ts.toDate === 'function') {
        ts = ts.toDate();
      } else if (ts && typeof ts.seconds === 'number') {
        ts = new Date(ts.seconds * 1000 + Math.floor((ts.nanoseconds || 0) / 1e6));
      } else if (!(ts instanceof Date)) {
        ts = new Date(ts);
      }

      return ts.toLocaleString('es-MX', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    } catch {
      return '—';
    }
  }

  renderSkeleton() {
    this.$.innerHTML = this.baseCard({
      pillClass: 'pill warn',
      pillText: 'CARGANDO…',
      medicoNombre: '—',
      medicoCedula: '—',
      medicamentosHtml: '<ul><li>—</li></ul>',
      indicaciones: '—',
      recetaId: '—',
      fecha: '—',
      asideText: 'Cargando información...'
    });
  }

  renderError(msg) {
    this.$.innerHTML = `
      <style>${this.styles()}</style>
      <div class="card error">❌ ${msg}</div>
    `;
  }

  render(r) {
    const pill = this.pillInfo(r);
    const meds = Array.isArray(r.medicamentos) ? r.medicamentos : [];

    const pref = (n, g) => (
      !n
        ? '—'
        : (String(g || '').toLowerCase().startsWith('f') ? 'Dra. ' : 'Dr. ') + n
    );

    const fecha = this.fecha(r.timestamp);

    const medicamentosHtml = meds.length
      ? `<ul>${meds.map(m => `
          <li>
            <strong>${m.nombre || '—'}</strong><br>
            Dosis: ${m.dosis || '—'}<br>
            Duración: ${m.duracion || '—'}
          </li>
        `).join('')}</ul>`
      : '<ul><li>—</li></ul>';

    this.$.innerHTML = this.baseCard({
      pillClass: pill.cls,
      pillText: pill.txt,
      medicoNombre: pref(r.medico?.nombre, r.medico?.genero),
      medicoCedula: r.medico?.cedula ?? '—',
      medicamentosHtml,
      indicaciones: String(r.indicaciones || '—').replace(/\n/g, '<br>'),
      recetaId: r.id || '—',
      fecha,
      asideText: `
        Esta es una vista pública de la receta. La información mostrada ha sido
        filtrada para proteger datos sensibles del paciente.
      `
    });
  }

  baseCard({
    pillClass,
    pillText,
    medicoNombre,
    medicoCedula,
    medicamentosHtml,
    indicaciones,
    recetaId,
    fecha,
    asideText
  }) {
    return `
      <style>${this.styles()}</style>

      <div class="card">
        <div class="head">
          <h1>Verificar receta</h1>
          <span class="${pillClass}">${pillText}</span>
        </div>

        <div class="row">
          <section>
            <div class="lbl">MÉDICO</div>
            <div class="val break">${medicoNombre}</div>
            <div class="muted">Cédula: ${medicoCedula}</div>

            <div class="lbl">MEDICAMENTOS</div>
            <div class="val">
              ${medicamentosHtml}
            </div>

            <div class="lbl">INDICACIONES</div>
            <div class="val break">${indicaciones}</div>

            <div class="lbl">ID / FECHA</div>
            <div class="idline">
              <span class="chip break">ID: ${recetaId}</span>
              <span class="chip">${fecha}</span>
            </div>
          </section>

          <aside>
            <div class="lbl">Estado</div>
            <p class="muted">${asideText}</p>
          </aside>
        </div>
      </div>
    `;
  }

  styles() {
    return `
      :host { all: initial; display:block; }
      *, *::before, *::after { box-sizing:border-box; }

      :host {
        font: 400 14px/1.55 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color:#111827;
      }

      .card {
        background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
        border:1px solid #e5e7eb;
        border-radius:18px;
        padding:20px 20px 22px;
        box-shadow:0 8px 24px rgba(15,23,42,.06);
      }

      .card.error {
        border-color:#fecaca;
        background:#fff1f2;
        color:#b91c1c;
      }

      .head {
        display:flex;
        justify-content:space-between;
        gap:12px;
        margin-bottom:6px;
        align-items:flex-start;
      }

      h1 {
        all:unset;
        font-weight:800;
        font-size:clamp(18px,4.8vw,24px);
        color:#0f172a;
        line-height:1.2;
      }

      .pill {
        padding:7px 12px;
        border-radius:999px;
        font-weight:800;
        font-size:12px;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        white-space:nowrap;
      }

      .ok {
        background:#16a34a;
        color:#fff;
      }

      .warn {
        background:#f59e0b;
        color:#111;
      }

      .lbl {
        color:#6b7280;
        font-weight:800;
        font-size:11px;
        text-transform:uppercase;
        letter-spacing:.04em;
        margin-top:14px;
      }

      .val {
        margin:5px 0 12px;
        white-space:pre-wrap;
        line-height:1.6;
      }

      .muted {
        color:#6b7280;
        font-size:13px;
        line-height:1.55;
      }

      .row {
        display:grid;
        grid-template-columns:1fr;
        gap:18px;
        margin-top:10px;
      }

      @media (min-width:840px){
        .row {
          grid-template-columns:1.25fr .75fr;
        }
      }

      aside {
        background:#f8fafc;
        border:1px solid #e5e7eb;
        border-radius:14px;
        padding:14px;
      }

      .idline {
        display:flex;
        gap:10px;
        flex-wrap:wrap;
      }

      .chip {
        background:#f3f4f6;
        border:1px solid #e5e7eb;
        border-radius:10px;
        padding:6px 10px;
        font-size:12px;
      }

      .break {
        overflow-wrap:anywhere;
        word-break:break-word;
      }

      ul {
        list-style:none;
        padding:0;
        margin:8px 0 0;
        display:grid;
        gap:10px;
      }

      li {
        padding:10px 12px;
        border:1px solid #e5e7eb;
        border-radius:12px;
        background:#fff;
        margin:0;
      }
    `;
  }
});
</script>
</body>
  </html>
